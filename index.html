<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>c4elovek | Персональная страница</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #161616 50%, #020202 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Увеличили отступ снизу, чтобы плеер не перекрывал контент */
            padding: 20px 20px 110px 20px;
            overflow-x: hidden;
        }

        /* Жидкие стеклянные блики на фоне */
        .bg-glow {
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, rgba(0,0,0,0) 70%);
            top: -10%;
            left: -10%;
            z-index: 1;
            pointer-events: none;
            filter: blur(40px);
        }
        .bg-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.02) 0%, rgba(0,0,0,0) 70%);
            bottom: -10%;
            right: -10%;
            z-index: 1;
            pointer-events: none;
            filter: blur(50px);
        }

        /* Карточка "Жидкое стекло" */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.4),
                inset 0 1px 2px rgba(255, 255, 255, 0.15);
            z-index: 2;
            animation: glassAppear 1s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes glassAppear {
            from { opacity: 0; transform: scale(0.95) translateY(15px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* Аватар */
        .avatar-container {
            position: relative;
            width: 115px;
            height: 115px;
            margin: 0 auto 24px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .avatar-container:hover .avatar {
            transform: scale(1.04);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.15);
        }

        /* Текст */
        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #ffffff 0%, #b3b3b3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .username {
            font-size: 13px;
            color: #8c8c8c;
            font-weight: 500;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .bio {
            font-size: 14.5px;
            color: #cccccc;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        /* Ссылки (Кнопки) */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .link-item:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.08);
        }

        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Подвал */
        .footer {
            margin-top: 32px;
            font-size: 11px;
            color: #555555;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* СТИЛЬ ЗАКРЕПЛЕННОГО ПЛЕЕРА СНИЗУ */
        .bottom-player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 420px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            z-index: 999;
            animation: playerSlideUp 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes playerSlideUp {
            from { transform: translate(-50%, 100px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .play-pause-btn {
            background: #ffffff;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #000000;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .play-pause-btn:hover {
            transform: scale(1.06);
            background: #e6e6e6;
        }

        .play-pause-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .track-meta {
            display: flex;
            flex-direction: column;
        }

        .track-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.3px;
        }

        .track-status {
            font-size: 11px;
            color: #8c8c8c;
            margin-top: 1px;
        }

        /* Анимированный эквалайзер */
        .equalizer {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            width: 18px;
            height: 16px;
        }

        .eq-bar {
            width: 3px;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            transform-origin: bottom;
            animation: bounce 0.6s ease-in-out infinite alternate;
            animation-play-state: paused; /* По умолчанию стоит на паузе */
        }

        .equalizer.playing .eq-bar {
            animation-play-state: running; /* Запускается при игре */
        }

        .eq-bar:nth-child(1) { animation-duration: 0.4s; }
        .eq-bar:nth-child(2) { animation-duration: 0.7s; }
        .eq-bar:nth-child(3) { animation-duration: 0.5s; }

        @keyframes bounce {
            0% { transform: scaleY(0.1); }
            100% { transform: scaleY(1); }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <!-- ТЕГ АУДИО (Грузит твою песню) -->
    <audio id="bg-music" src="song.mp3" loop></audio>

    <!-- ПАНЕЛЬ КАСТОМНОГО ПЛЕЕРА СНИЗУ ЭКРАНА -->
    <div class="bottom-player">
        <div class="player-controls">
            <button id="play-btn" class="play-pause-btn" title="Play">
                <!-- Иконка Play (треугольник) -->
                <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <!-- Иконка Pause (две полоски, скрыта изначально) -->
                <svg id="icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <div class="track-meta">
                <span class="track-name">pupsies misery</span>
                <span id="player-status" class="track-status">нажмите Play</span>
            </div>
        </div>
        
        <!-- Анимация волны звука -->
        <div id="eq" class="equalizer">
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
        </div>
    </div>

    <!-- СКРИПТ УПРАВЛЕНИЯ ПЛЕЕРОМ -->
    <script>
        const audio = document.getElementById('bg-music');
        const playBtn = document.getElementById('play-btn');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const statusText = document.getElementById('player-status');
        const eq = document.getElementById('eq');

        // Функция переключения воспроизведения
        function togglePlay() {
            if (audio.paused) {
                audio.play().then(() => {
                    iconPlay.style.display = 'none';
                    iconPause.style.display = 'block';
                    statusText.innerText = 'сейчас играет';
                    eq.classList.add('playing');
                }).catch(err => {
                    console.log("Автозапуск заблокирован браузером. Требуется клик.");
                });
            } else {
                audio.pause();
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
                statusText.innerText = 'на паузе';
                eq.classList.remove('playing');
            }
        }

        playBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Чтобы не срабатывал клик по body
            togglePlay();
        });

        // Обход блокировки звука: клик в любое место экрана запустит песню (однократно)
        window.addEventListener('click', () => {
            if (audio.paused && audio.currentTime === 0) {
                audio.play().then(() => {
                    iconPlay.style.display = 'none';
                    iconPause.style.display = 'block';
                    statusText.innerText = 'сейчас играет';
                    eq.classList.add('playing');
                }).catch(() => {});
            }
        }, { once: true });
    </script>

</body>
</html>
